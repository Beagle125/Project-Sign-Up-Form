<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="styles.css">
    <title>Sign-up-Form</title>
</head>
<body>
    <div id="main-section">
        <div id="image-section">
            <div class="image-banner">
                <img class="image-logo" src="./static/odin-lined.png" alt="odin logo">
                <h1 class="image-text">ODIN</h1>
            </div>
        </div>
        <!--This marks the start of the content section-->
        <div id="form-section">
            <div class="form-header">
                <p>
                    This is not a real online service! 
                    You know you need something like 
                    this in your life to help you 
                    realize your deepest dreams. 
                    Sign up now to get started.
                </p>
                <p>
                    You know you want to.
                </p>
            </div>
            <form action="./", method="post">
                <h2>Let's do this!</h2>
                <div class="form-body">
                    <div class="form-col">
                        <label for="first-name">First Name</label>
                        <input type="text" id="first-name" name="first-name">
                        <label for="email">Email</label>
                        <input type="email" id="email" name=email>
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password">
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
