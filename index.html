<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Sans+Runic&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="styles.css">
    <title>Sign-up-Form</title>
</head>
<body>
    <div id="main-section">
        <div id="image-section">
            <div class="image-banner">
                <img class="image-logo" src="./static/odin-lined.png" alt="odin logo">
                <h1 class="image-text">ODIN</h1>
            </div>
        </div>
        <!--This marks the start of the content section-->
        <div id="form-section">
            <div class="form-header">
                <p>
                    This is not a real online service! 
                    You know you need something like 
                    this in your life to help you 
                    realize your deepest dreams. 
                    Sign up now to get started.
                </p>
                <p>
                    You know you want to.
                </p>
            </div>
            <form action="./", method="post" id="my-form">
                <h1>Let's do this!</h1>
                <div class="form-body">
                    <div class="form-col">
                        <div class="form-input">
                            <label for="first-name">First Name</label>
                            <input type="text" id="first-name" name="first-name">
                        </div>
                        <div class="form-input">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="XXX@gmail.com">
                        </div class="form-input">
                        <div class="form-input">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required>
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-input">
                            <label for="last-name">Last Name</label>
                            <input type="text" id="last-name" name="last-name">
                        </div class="form-input">
                        <div class="form-input">
                            <label for="tel-number">Telephone Number</label>
                            <input type="tel" id="tel-number" name="tel-number" placeholder="XXXX-XXX-XXX">
                        </div>
                        <div class="form-input">
                            <label for="confirmation">Confirm Password</label>
                            <input type="password" id="confirmation" name="confirmation" required>
                        </div>
                    </div>
                </div>
            </form>
            <div class="form-footer">
                <button type="submit" form="my-form">Create Account</button>
                <p>Already have an account? <a href="google.com">Log in</a></p> 
            </div>
        </div>
    </div>
</body>
</html>
