<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="styles.css">
    <title>Sign-up-Form</title>
</head>
<body>
    <div id="main-section">
        <div id="image-section">
            <div class="image-banner">
                <img class="image-logo" src="./static/odin-lined.png" alt="odin logo">
                <h1 class="image-text">ODIN SPA</h1>
            </div>
        </div>
        <div id="content-section">
            <div class="content-header">
                <p>
                    Had a rough day? Treat your self with some relaxation with
                    a free one-hour spa session. Its simple! Just sign up below
                    to get started.
                </p>
            </div>
            <form action="./" method="get">
                <div class="form-body">
                    <h1>Let's Do This!</h1>
                    <fieldset>
                        <legend>Guest Name</legend>
                        <label for="first_name">First Name</label>
                        <input type="text" id="first_name" name="first_name">

                        <label for="last_name">Last Name</label>
                        <input type="text" id="last_name" name="last_name">
                    </fieldset>
                    <fieldset>
                        <legend>Guest Contact</legend>
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email">

                        <label for="phone_number">Phone Number</label>
                        <input type="tel" id="phone_number" name="phone_number">
                    </fieldset>
                    <fieldset>
                        <legend>Services</legend>
                        <label for="services">Select Service</label>
                        <select id="services" name="services">
                            <option value="select_service" selected disabled>Select Service</option>
                            <option value="massage_therapy">Massage Therapy</option>
                            <option value="body_treatments">Body Treatments</option>
                            <option value="skin_care">Skin Care</option>
                            <option value="grooming">Grooming</option>
                            <option value="specialty">Specialty</option>
                        </select>
                    </fieldset>
                </div>
                <button type="submit">Submit</button>
            </form>
            <div class="content-footer">

            </div>
        </div>
    </div>
</body>
</html>
